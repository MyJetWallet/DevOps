name: BUILD UAT

on:
  workflow_call:
    inputs:
      repository_name:
        required: true
        type: string
      repository_type:
        required: true
        type: string
      release_version:
        required: true
        type: string
    secrets:
      ST_DOCKER_USER:
        required: true
      ST_DOCKER_PASSWORD:
        required: true
      AZURE_CONTAINER_REGISTRY:
        required: true
      UAT_GIT_TOKEN:
        required: true

jobs:

  docker-build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - id: string
        uses: ASzc/change-string-case-action@v1
        with:
          string: ${{ inputs.repository_name }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          username: ${{ secrets.ST_DOCKER_USER }}
          password: ${{ secrets.ST_DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AZURE_CONTAINER_REGISTRY }}/spot/myjetwallet.${{ steps.string.outputs.lowercase }}:${{ inputs.release_version }}
            ${{ secrets.AZURE_CONTAINER_REGISTRY }}/spot/myjetwallet.${{ steps.string.outputs.lowercase }}:latest

  docker-deploy:
    needs: [docker-build]
    runs-on: self-hosted

    steps:
      - id: string
        uses: ASzc/change-string-case-action@v1
        with:
          string: ${{ inputs.repository_name }}

      - name: Checkout docker infrastructure
        uses: actions/checkout@v3
        with:
          repository: MyJetWallet/docker-infrastructure
          ref: uat
          token: ${{ secrets.UAT_GIT_TOKEN }}

      - name: Update image version in docker yamls
        run: |
          pattern=myjetwallet.${{ steps.string.outputs.lowercase }}:.*$
          imagename=myjetwallet.${{ steps.string.outputs.lowercase }}:${{ inputs.release_version }}
          reg="s/${pattern}/${imagename}/g"
          echo $reg

          find . -type f \( -name "*.yml" -o -name "*.yaml" \) -exec sed -i -r "$reg" {} \;

          git config user.name github-actions
          git config user.email github-actions@github.com

          if git status | grep -q modified; then
            git commit -a -m "Update version of service myjetwallet.${{ steps.string.outputs.lowercase }}"
            git push
          fi
